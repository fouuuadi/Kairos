version: "3.9"
services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: dca_tracker
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8001:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db:5432/dca_tracker
      RESEND_API_KEY: ${RESEND_API_KEY:-re_xxxxxxxxxxxx}
      ALERT_EMAIL: ${ALERT_EMAIL:-ton@email.com}
      PRICE_REFRESH_INTERVAL: ${PRICE_REFRESH_INTERVAL:-60}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build: ./frontend
    ports:
      - "5180:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host

volumes:
  postgres_data:
